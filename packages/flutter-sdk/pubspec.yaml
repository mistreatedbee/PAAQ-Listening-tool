name: paaq_listening_sdk
description: PAAQ Listening Platform SDK for Flutter. Automatically tracks sessions, events, errors, and performance.
version: 0.1.0
homepage: https://github.com/mistreatedbee/PAAQ-Listening-tool

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.2.0
  uuid: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0
